name = "zeta"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER"
keep_vars = true

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "D1_DATABASE_NAME_PLACEHOLDER"
database_id   = "D1_DATABASE_ID_PLACEHOLDER"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "KV_NAMESPACE_ID_PLACEHOLDER"

# Secrets – set via dashboard or `wrangler secret put`:
#   JWT_SECRET       – random 64-char string
#   ENCRYPTION_KEY   – 64-char hex (32 bytes) for AES-GCM TOTP encryption
#   SETUP_SECRET     – random string used to protect GET /api/setup/:secret
