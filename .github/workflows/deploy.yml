name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    env:
      WRANGLER_SEND_METRICS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: cd web && pnpm build

      - name: Patch wrangler.toml
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
          QUERY_DB_1_NAME: ${{ vars.QUERY_DB_1_NAME }}
          QUERY_DB_1_ID: ${{ vars.QUERY_DB_1_ID }}
          QUERY_DB_2_NAME: ${{ vars.QUERY_DB_2_NAME }}
          QUERY_DB_2_ID: ${{ vars.QUERY_DB_2_ID }}
          QUERY_DB_3_NAME: ${{ vars.QUERY_DB_3_NAME }}
          QUERY_DB_3_ID: ${{ vars.QUERY_DB_3_ID }}
          QUERY_DB_4_NAME: ${{ vars.QUERY_DB_4_NAME }}
          QUERY_DB_4_ID: ${{ vars.QUERY_DB_4_ID }}
          QUERY_DB_5_NAME: ${{ vars.QUERY_DB_5_NAME }}
          QUERY_DB_5_ID: ${{ vars.QUERY_DB_5_ID }}
          QUERY_DB_6_NAME: ${{ vars.QUERY_DB_6_NAME }}
          QUERY_DB_6_ID: ${{ vars.QUERY_DB_6_ID }}
          QUERY_DB_7_NAME: ${{ vars.QUERY_DB_7_NAME }}
          QUERY_DB_7_ID: ${{ vars.QUERY_DB_7_ID }}
          QUERY_DB_8_NAME: ${{ vars.QUERY_DB_8_NAME }}
          QUERY_DB_8_ID: ${{ vars.QUERY_DB_8_ID }}
          QUERY_DB_9_NAME: ${{ vars.QUERY_DB_9_NAME }}
          QUERY_DB_9_ID: ${{ vars.QUERY_DB_9_ID }}
          QUERY_DB_10_NAME: ${{ vars.QUERY_DB_10_NAME }}
          QUERY_DB_10_ID: ${{ vars.QUERY_DB_10_ID }}
        run: |
          sed -i "s/CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER/${CLOUDFLARE_ACCOUNT_ID}/" wrangler.toml
          sed -i "s/D1_DATABASE_NAME_PLACEHOLDER/${D1_DATABASE_NAME}/" wrangler.toml
          sed -i "s/D1_DATABASE_ID_PLACEHOLDER/${D1_DATABASE_ID}/" wrangler.toml
          sed -i "s/KV_NAMESPACE_ID_PLACEHOLDER/${KV_NAMESPACE_ID}/" wrangler.toml

          for i in $(seq 1 10); do
            name_var="QUERY_DB_${i}_NAME"
            id_var="QUERY_DB_${i}_ID"
            db_name="${!name_var}"
            db_id="${!id_var}"

            if [[ -n "$db_name" && -n "$db_id" ]]; then
              printf '\n[[d1_databases]]\nbinding = "QUERY_DB_%d"\ndatabase_name = "%s"\ndatabase_id   = "%s"\n' \
                "$i" "$db_name" "$db_id" >> wrangler.toml
              echo "Appended QUERY_DB_${i}: name=${db_name}"
            elif [[ -n "$db_name" || -n "$db_id" ]]; then
              echo "WARNING: QUERY_DB_${i} incomplete — both ${name_var} and ${id_var} must be set. Skipping."
            fi
          done

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy
