name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: cd web && pnpm build

      - name: Patch wrangler.toml
        working-directory: worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_D1_DATABASE_NAME: ${{ vars.CF_D1_DATABASE_NAME }}
          CF_D1_DATABASE_ID: ${{ vars.CF_D1_DATABASE_ID }}
          CF_KV_NAMESPACE_ID: ${{ vars.CF_KV_NAMESPACE_ID }}
        run: |
          sed -i "s/CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER/${CLOUDFLARE_ACCOUNT_ID}/" wrangler.toml
          sed -i "s/DB_NAME_PLACEHOLDER/${CF_D1_DATABASE_NAME}/" wrangler.toml
          sed -i "s/DB_ID_PLACEHOLDER/${CF_D1_DATABASE_ID}/" wrangler.toml
          sed -i "s/KV_ID_PLACEHOLDER/${CF_KV_NAMESPACE_ID}/" wrangler.toml

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy
